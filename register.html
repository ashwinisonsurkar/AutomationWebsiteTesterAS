<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Practice</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Registration Form</h1>
</header>

<div class="login-container">

<form id="registrationForm">

<label>First Name</label>
<input type="text" id="firstName" name="firstName" class="input-field">

<label>Last Name</label>
<input type="text" id="lastName" name="lastName" class="input-field">

<label>Email</label>
<input type="email" id="email" name="email" class="input-field">

<label>Password</label>
<input type="password" id="password" name="password" class="input-field">

<label>Mobile Number</label>
<input type="tel" id="mobile" name="mobile" class="input-field">

<label>Date of Birth</label>
<input type="date" id="dob" name="dob" class="input-field">

<label>Gender</label><br>

<input type="radio" id="male" name="gender" value="Male">
<label for="male">Male</label>

<input type="radio" id="female" name="gender" value="Female">
<label for="female">Female</label>

<input type="radio" id="other" name="gender" value="Other">
<label for="other">Other</label>

<br><br>

<label>Skills</label><br>

<input type="checkbox" id="selenium" value="Selenium">
<label for="selenium">Selenium</label>

<input type="checkbox" id="java" value="Java">
<label for="java">Java</label>

<input type="checkbox" id="api" value="API Testing">
<label for="api">API Testing</label>

<input type="checkbox" id="sql" value="SQL">
<label for="sql">SQL</label>

<br><br>

<label>Country</label>

<select id="country" class="input-field">
<option>Select Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Australia</option>
</select>

<label>Upload Resume</label>

<input type="file" id="resume" class="input-field">

<label>Address</label>

<textarea id="address" rows="4" class="input-field"></textarea>

<button type="submit" class="btn" id="submitBtn">
Submit
</button>

<button type="reset" class="btn" id="resetBtn">
Reset
</button>

</form>

</div>

</body>
</html>
